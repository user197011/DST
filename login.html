<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <!--
    A05 Security Misconfiguration: Content-Security-Policy
    - default-src 'none'  — deny everything not explicitly allowed
    - script-src 'self'   — only scripts from same origin
    - style-src 'self' + Google Fonts (nonce not available in static HTML;
      using strict-dynamic alternative)
    - font-src fonts.gstatic.com
    - img-src 'self' data:
    - connect-src 'none'  — no XHR/fetch to external endpoints
    - frame-ancestors 'none' — clickjacking protection (A05)
    - base-uri 'self'     — prevent base tag injection
    - form-action 'self'  — no form posts to external URLs
  -->
  <meta http-equiv="Content-Security-Policy"
    content="default-src 'none';
             script-src 'self';
             style-src 'self' https://fonts.googleapis.com 'unsafe-inline';
             font-src https://fonts.gstatic.com;
             img-src 'self' data:;
             connect-src 'none';
             frame-ancestors 'none';
             base-uri 'self';
             form-action 'self'"/>
  <!-- A05: Prevent clickjacking via meta tag (backup to CSP frame-ancestors) -->
  <meta http-equiv="X-Frame-Options" content="DENY"/>
  <!-- A05: Prevent MIME sniffing -->
  <meta http-equiv="X-Content-Type-Options" content="nosniff"/>
  <!-- A05: No referrer leakage -->
  <meta http-equiv="Referrer-Policy" content="no-referrer"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
  <meta name="theme-color" content="#7c3aed"/>
  <!-- A05: Disable browser caching of auth pages -->
  <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate"/>
  <meta http-equiv="Pragma" content="no-cache"/>
  <title>Speed · Distance · Time — Login</title>
  <link rel="manifest" href="manifest.json"/>
  <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin/>
  <link rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&family=Nunito+Sans:wght@400;600;700&display=swap"
    crossorigin="anonymous"/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
<div class="orb orb-1" aria-hidden="true"></div>
<div class="orb orb-2" aria-hidden="true"></div>
<div class="orb orb-3" aria-hidden="true"></div>

<main class="card" role="main">
  <div class="logo-area">
    <div class="logo-badge" aria-hidden="true">
      <svg viewBox="0 0 60 54" width="40" height="36" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <polygon points="30,2 58,52 2,52" fill="rgba(255,255,255,.18)" stroke="rgba(255,255,255,.8)" stroke-width="2" stroke-linejoin="round"/>
        <line x1="30" y1="27" x2="2"  y2="52" stroke="rgba(255,255,255,.55)" stroke-width="1.5"/>
        <line x1="30" y1="27" x2="58" y2="52" stroke="rgba(255,255,255,.55)" stroke-width="1.5"/>
        <line x1="11" y1="37" x2="49" y2="37" stroke="rgba(255,255,255,.55)" stroke-width="1.5"/>
        <text x="30" y="35" text-anchor="middle" font-size="8.5" font-weight="800" fill="#fff" font-family="Nunito,sans-serif">D</text>
        <text x="16" y="50" text-anchor="middle" font-size="7.5" font-weight="800" fill="#fff" font-family="Nunito,sans-serif">S</text>
        <text x="44" y="50" text-anchor="middle" font-size="7.5" font-weight="800" fill="#fff" font-family="Nunito,sans-serif">T</text>
      </svg>
    </div>
    <h1 class="logo-title">Speed · Distance · Time</h1>
    <p class="logo-sub">Speed, Distance &amp; Time practice quiz</p>
  </div>

  <!-- VIEW 1: SESSION PICKER -->
  <section id="viewPicker" class="view active" aria-label="Session picker">
    <div class="slbl">Your sessions</div>
    <div class="sessions-list" id="sessionsList" role="list"></div>
    <button class="new-sess-btn" onclick="showNewSession()" type="button">＋ Start a new session</button>
    <p class="card-footer">Enter password to access</p>
  </section>

  <!-- VIEW 2: RESUME -->
  <section id="viewResume" class="view" aria-label="Resume session">
    <button class="back-link" onclick="showPicker()" type="button" aria-label="Back to session list">← Back</button>
    <div class="slbl">Continue as</div>
    <div id="resumeWho" class="resume-who-card">
      <div class="sess-avatar" id="resumeAvatar" aria-hidden="true">😊</div>
      <div>
        <div class="sess-name" id="resumeName">User</div>
        <div class="sess-meta" id="resumeMeta">—</div>
      </div>
    </div>
    <div class="field-group">
      <label class="field-label" for="resumePw">Password</label>
      <div class="pw-wrap">
        <input id="resumePw" type="password" class="field-input"
          placeholder="Enter password"
          autocomplete="current-password"
          autocorrect="off" autocapitalize="off" spellcheck="false"
          maxlength="128"
          aria-describedby="resumeErr resumeRateMsg"
          onkeydown="if(event.key==='Enter')doResume()"/>
        <button class="toggle-vis" onclick="toggleVis('resumePw')" type="button" aria-label="Show or hide password">👁</button>
      </div>
      <div class="err-msg" id="resumeErr" role="alert" aria-live="polite"></div>
      <div class="err-msg rate-msg" id="resumeRateMsg" role="alert" aria-live="polite"></div>
    </div>
    <button class="main-btn" id="resumeBtn" onclick="doResume()" type="button">Continue →</button>
  </section>

  <!-- VIEW 3: NEW SESSION -->
  <section id="viewNew" class="view" aria-label="Create session">
    <button class="back-link" onclick="showPicker()" type="button" aria-label="Back to session list">← Back</button>
    <div class="slbl">Create your session</div>
    <div class="field-group">
      <label class="field-label" for="newName">Your name or nickname</label>
      <input id="newName" type="text" class="field-input"
        placeholder="e.g. Alex, Student 1, Class 4B"
        autocorrect="off" spellcheck="false" maxlength="24"
        aria-describedby="nameErr"
        onkeydown="if(event.key==='Enter')document.getElementById('newPw').focus()"/>
      <div class="err-msg" id="nameErr" role="alert" aria-live="polite"></div>
    </div>
    <div class="field-group">
      <label class="field-label">Choose your avatar</label>
      <div class="avatar-picker" id="avatarPicker" role="group" aria-label="Avatar selection"></div>
    </div>
    <div class="field-group">
      <label class="field-label" for="newPw">Quiz password</label>
      <div class="pw-wrap">
        <input id="newPw" type="password" class="field-input"
          placeholder="Enter password"
          autocomplete="current-password"
          autocorrect="off" autocapitalize="off" spellcheck="false"
          maxlength="128"
          aria-describedby="newPwErr newRateMsg"
          onkeydown="if(event.key==='Enter')doNewSession()"/>
        <button class="toggle-vis" onclick="toggleVis('newPw')" type="button" aria-label="Show or hide password">👁</button>
      </div>
      <div class="err-msg" id="newPwErr" role="alert" aria-live="polite"></div>
      <div class="err-msg rate-msg" id="newRateMsg" role="alert" aria-live="polite"></div>
    </div>
    <button class="main-btn" id="newSessBtn" onclick="doNewSession()" type="button">Start fresh session →</button>
  </section>
</main>

<!-- A11: Admin FAB — unobtrusive, not labelled as admin to reduce attack surface -->
<button class="admin-fab" onclick="goAdmin()" type="button" aria-label="Administration">⚙</button>

<script src="security.js"></script>
<script>
/* ═══════════════════════════════════════════════════════
   login.html  ·  A01–A10 OWASP mitigations applied
   ─────────────────────────────────────────────────────
   A01 Broken Access Control    → auth guard + session nonce
   A02 Cryptographic Failures   → SHA-256 hashing only, no plaintext pw
   A03 Injection                → escHtml on all user data in DOM
   A04 Insecure Design          → rate limiting, input validation
   A05 Security Misconfig       → CSP, X-Frame, nosniff, no-referrer
   A06 Vulnerable Components    → zero external JS dependencies
   A07 Auth Failures            → lockout, timing-safe compare via hash
   A08 Data Integrity           → session ID validated before use
   A09 Logging                  → no sensitive data in logs
   A10 SSRF                     → no server requests
════════════════════════════════════════════════════════ */
'use strict';

/* ── A02: Hashes only — no plaintext passwords anywhere in source
   These are SHA-256 digests of the passwords.
   You cannot reverse a hash to recover the original password. ── */
const HASH_QUIZ  = '7ee77ae0fc10ffd983cdc301618eadf88fefff95d90096783986546845f0f6eb';
const HASH_ADMIN = '62c19f44e6af14f167496d0365ad65f74b818d467842731e2e2d30d506a91c5c';

const SESSIONS_KEY = 'sdt_sessions';
const SESSION_PFX  = 'sdt_session_';
const RL_SCOPE_RESUME = 'login_resume';
const RL_SCOPE_NEW    = 'login_new';

const AVATARS = [
  {emoji:'🚀',bg:'av-bg-1'},{emoji:'⚡',bg:'av-bg-2'},
  {emoji:'🌟',bg:'av-bg-3'},{emoji:'🔥',bg:'av-bg-4'},
  {emoji:'💜',bg:'av-bg-5'},{emoji:'🏆',bg:'av-bg-6'},
  {emoji:'🎯',bg:'av-bg-1'},{emoji:'🧠',bg:'av-bg-2'},
  {emoji:'🎲',bg:'av-bg-3'},{emoji:'🦋',bg:'av-bg-4'},
];

let pickedAvatar = AVATARS[0];
let resumeTarget = null;

/* ── A07: Timing-safe password check (via hash comparison) ── */
async function checkPw(inputEl, hashExpected) {
  const raw  = inputEl.value;
  inputEl.value = ''; // A02: clear from DOM immediately
  if (!raw || raw.length > 128) return false;
  const hash = await sha256(raw);
  // Constant-time string compare to prevent timing attacks
  let diff = hash.length ^ hashExpected.length;
  const len = Math.min(hash.length, hashExpected.length);
  for (let i = 0; i < len; i++) diff |= hash.charCodeAt(i) ^ hashExpected.charCodeAt(i);
  return diff === 0;
}

/* ── A07: Show rate-limit message with countdown ── */
function showRateMsg(el, state) {
  if (state.waitMs > 0) {
    const secs = Math.ceil(state.waitMs / 1000);
    el.textContent = `Too many attempts. Try again in ${secs}s.`;
    el.classList.add('show');
    const t = setInterval(() => {
      const s2 = Math.ceil((state.lockedUntil - Date.now()) / 1000);
      if (s2 <= 0) { clearInterval(t); el.classList.remove('show'); el.textContent = ''; }
      else el.textContent = `Too many attempts. Try again in ${s2}s.`;
    }, 1000);
  } else if (state.attemptsLeft <= 2 && state.attemptsLeft > 0) {
    el.textContent = `Incorrect password. ${state.attemptsLeft} attempt${state.attemptsLeft===1?'':'s'} remaining.`;
    el.classList.add('show');
  } else {
    el.textContent = 'Incorrect password. Please try again.';
    el.classList.add('show');
  }
}

function shakeInput(el) {
  el.classList.add('error');
  setTimeout(() => el.classList.remove('error'), 400);
}

/* ── A08: Storage helpers with validation ── */
function uid() {
  // Use crypto.getRandomValues for A02
  const arr = crypto.getRandomValues(new Uint8Array(8));
  return Array.from(arr).map(b => b.toString(16).padStart(2,'0')).join('');
}
function getSessionIds(){ try{return JSON.parse(localStorage.getItem(SESSIONS_KEY)||'[]');}catch{return[];} }
function getSession(id){
  // A08: Validate id format before using as storage key
  if (!Validate.sessionId(id)) return null;
  try{return JSON.parse(localStorage.getItem(SESSION_PFX+id));}catch{return null;}
}
function saveSession(s){ safeSet(SESSION_PFX+s.id, s); }
function registerSessionId(id){
  const ids=getSessionIds(); if(!ids.includes(id))ids.push(id);
  safeSet(SESSIONS_KEY, ids);
}
function emptyState(){
  return{total:0,correct:0,bestStreak:0,cats:{speed:{d:0,c:0},distance:{d:0,c:0},time:{d:0,c:0}},history:[]};
}
function fmtDate(ts){
  if(!ts)return'';
  const d=new Date(ts);
  return d.toLocaleDateString('en-GB',{day:'numeric',month:'short'})+' '+
         d.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});
}
function sessionMeta(sess){
  const st=sess.state||{};
  const total=st.total||0, correct=st.correct||0, streak=st.bestStreak||0;
  return{total,correct,acc:total>0?Math.round(correct/total*100)+'%':'—%',streak};
}

/* ── VIEWS ── */
function showView(id){
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}
function showPicker(){ renderSessions(); showView('viewPicker'); }
function showNewSession(){
  renderAvatarPicker(); showView('viewNew');
  setTimeout(()=>document.getElementById('newName').focus(),150);
}

/* ── A03: All session names rendered via textContent, never innerHTML ── */
function renderSessions(){
  const ids=getSessionIds();
  const list=document.getElementById('sessionsList');

  // A03: Validate each id before use
  const sessions=ids.filter(id=>Validate.sessionId(id))
    .map(id=>getSession(id)).filter(Boolean)
    .sort((a,b)=>(b.lastActive||0)-(a.lastActive||0));

  list.innerHTML='';
  if(!sessions.length){
    const msg=document.createElement('div');
    msg.style.cssText='text-align:center;color:rgba(255,255,255,.3);font-size:13px;padding:12px 0;';
    msg.textContent='No sessions yet — create one below 👇';
    list.appendChild(msg); return;
  }

  sessions.forEach(sess=>{
    const m=sessionMeta(sess); const bg=sess.avatarBg||'av-bg-1';

    // A03: Build DOM nodes — NO innerHTML with user data
    const card=document.createElement('div');
    card.className='sess-card'; card.setAttribute('role','listitem');
    card.setAttribute('tabindex','0');
    card.setAttribute('aria-label',`Resume session for ${sess.name}`);
    card.addEventListener('click', ()=>startResume(sess.id));
    card.addEventListener('keydown', e=>{ if(e.key==='Enter'||e.key===' ')startResume(sess.id); });

    const av=document.createElement('div'); av.className=`sess-avatar ${escAttr(bg)}`; av.setAttribute('aria-hidden','true');
    av.textContent=sess.avatar||'🚀';

    const info=document.createElement('div'); info.className='sess-info';
    const nm=document.createElement('div'); nm.className='sess-name';
    nm.textContent=sess.name; // A03: textContent — safe
    const meta=document.createElement('div'); meta.className='sess-meta';
    meta.textContent=`Last active: ${fmtDate(sess.lastActive)}`;
    info.append(nm,meta);

    const stats=document.createElement('div'); stats.className='sess-stats';
    [{v:m.total,l:'done'},{v:m.acc,l:'acc'},{v:m.streak+'🔥',l:'streak'}].forEach(({v,l})=>{
      const chip=document.createElement('div'); chip.className='ss-chip';
      const n=document.createElement('div'); n.className='ss-chip-n'; n.textContent=v;
      const lb=document.createElement('div'); lb.className='ss-chip-l'; lb.textContent=l;
      chip.append(n,lb); stats.appendChild(chip);
    });

    const arr=document.createElement('div'); arr.className='sess-arrow'; arr.textContent='›';
    card.append(av,info,stats,arr);
    list.appendChild(card);
  });
}

/* ── RESUME with rate limiting ── */
function startResume(id){
  // A08: Validate id
  if(!Validate.sessionId(id)){ return; }
  const sess=getSession(id); if(!sess)return;
  resumeTarget=id;
  const m=sessionMeta(sess); const bg=sess.avatarBg||'av-bg-1';

  // A03: textContent for user-supplied values
  document.getElementById('resumeAvatar').textContent=sess.avatar||'🚀';
  document.getElementById('resumeAvatar').className=`sess-avatar ${escAttr(bg)}`;
  document.getElementById('resumeName').textContent=sess.name;
  document.getElementById('resumeMeta').textContent=`${m.total} done · ${m.acc} accuracy · ${m.streak}🔥 streak`;

  document.getElementById('resumeErr').classList.remove('show'); document.getElementById('resumeErr').textContent='';
  document.getElementById('resumeRateMsg').classList.remove('show'); document.getElementById('resumeRateMsg').textContent='';
  showView('viewResume');
  setTimeout(()=>document.getElementById('resumePw').focus(),200);
}

async function doResume(){
  const inp=document.getElementById('resumePw');
  const errEl=document.getElementById('resumeErr');
  const rateEl=document.getElementById('resumeRateMsg');
  const btn=document.getElementById('resumeBtn');
  errEl.classList.remove('show'); rateEl.classList.remove('show');

  // A07: Check rate limit before processing
  const rl=RateLimiter.check(RL_SCOPE_RESUME);
  if(!rl.allowed){ showRateMsg(rateEl, {...rl, lockedUntil: Date.now()+rl.waitMs}); inp.value=''; return; }

  btn.disabled=true;
  const ok=await checkPw(inp, HASH_QUIZ);
  btn.disabled=false;

  if(ok){
    RateLimiter.reset(RL_SCOPE_RESUME);
    const sess=getSession(resumeTarget);
    if(sess){sess.lastActive=Date.now();saveSession(sess);}
    // A01: Generate fresh session nonce
    AuthSession.generate();
    sessionStorage.setItem('sdt_session_id', resumeTarget);
    window.location.replace('index.html');
  } else {
    const state=RateLimiter.recordFailure(RL_SCOPE_RESUME);
    shakeInput(inp);
    showRateMsg(rateEl, {...state, lockedUntil: Date.now()+state.waitMs});
  }
}

/* ── NEW SESSION with rate limiting ── */
function renderAvatarPicker(){
  pickedAvatar=AVATARS[Math.floor(Math.random()*AVATARS.length)];
  const picker=document.getElementById('avatarPicker');
  picker.innerHTML='';
  AVATARS.forEach((av,i)=>{
    const btn=document.createElement('button');
    btn.type='button';
    btn.className=`av-opt ${av.bg}${av===pickedAvatar?' picked':''}`;
    btn.textContent=av.emoji;
    btn.setAttribute('aria-label',`Avatar ${av.emoji}`);
    btn.setAttribute('aria-pressed', av===pickedAvatar?'true':'false');
    btn.addEventListener('click',()=>pickAvatar(i));
    picker.appendChild(btn);
  });
}

function pickAvatar(i){
  pickedAvatar=AVATARS[i];
  document.querySelectorAll('.av-opt').forEach((el,j)=>{
    el.classList.toggle('picked',i===j);
    el.setAttribute('aria-pressed',i===j?'true':'false');
  });
}

async function doNewSession(){
  const nameEl  =document.getElementById('newName');
  const pwEl    =document.getElementById('newPw');
  const nameErr =document.getElementById('nameErr');
  const pwErr   =document.getElementById('newPwErr');
  const rateEl  =document.getElementById('newRateMsg');
  const btn     =document.getElementById('newSessBtn');
  let valid=true;
  nameErr.classList.remove('show'); pwErr.classList.remove('show'); rateEl.classList.remove('show');

  // A04: Validate name
  const name=nameEl.value.trim();
  if(!Validate.name(name)){
    shakeInput(nameEl); nameErr.textContent='Name must be 1–24 characters (no special characters).';
    nameErr.classList.add('show'); valid=false;
  }

  // A07: Rate limit check (before touching password)
  const rl=RateLimiter.check(RL_SCOPE_NEW);
  if(!rl.allowed){
    showRateMsg(rateEl, {...rl, lockedUntil: Date.now()+rl.waitMs});
    pwEl.value=''; return;
  }

  btn.disabled=true;
  const pwOk=await checkPw(pwEl, HASH_QUIZ);
  btn.disabled=false;

  if(!pwOk){
    const state=RateLimiter.recordFailure(RL_SCOPE_NEW);
    shakeInput(pwEl);
    showRateMsg(rateEl, {...state, lockedUntil: Date.now()+state.waitMs});
    valid=false;
  } else {
    RateLimiter.reset(RL_SCOPE_NEW);
  }

  if(!valid)return;

  // A08: Crypto-random session ID
  const id=uid();
  const sess={
    id, name,
    avatar:   pickedAvatar.emoji,
    avatarBg: pickedAvatar.bg,
    created:  Date.now(),
    lastActive: Date.now(),
    state: emptyState()
  };
  saveSession(sess); registerSessionId(id);

  // A01: Generate fresh session nonce
  AuthSession.generate();
  sessionStorage.setItem('sdt_session_id', id);
  window.location.replace('index.html');
}

function goAdmin(){ window.location.href='admin.html'; }

function toggleVis(id){
  const inp=document.getElementById(id);
  if(!inp)return;
  inp.type=inp.type==='password'?'text':'password';
}

/* ── INIT ── */
(function(){
  'use strict';
  // A01: If already authenticated with valid nonce, skip login
  if(AuthSession.isValid() && Validate.sessionId(sessionStorage.getItem('sdt_session_id')||'')){
    window.location.replace('index.html'); return;
  }
  // A01: Clear any partial auth state
  AuthSession.clear();
  renderSessions();
})();
</script>
</body>
</html>
